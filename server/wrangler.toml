name = "preklead-server"
main = "src/index.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "preklead-db"
database_id = "181471ab-db7f-4ddc-979c-c13695ef0e01"

[[kv_namespaces]]
binding = "KV"
id = "30d45c59486f4a21a16bf6541e0e25c3"

[[r2_buckets]]
binding = "R2"
bucket_name = "preklead-assets"

[ai]
binding = "AI"

[vars]
SMTP_EMAIL = ""
